kind = "web"
previewPath = "/"
title = "Estate Hub"
version = "1.0.0"
id = "artifacts/estate-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25393

[services.development]
run = "pnpm --filter @workspace/estate-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estate-hub", "run", "build" ]
publicDir = "artifacts/estate-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25393"
BASE_PATH = "/"
